- name: cli-plugin-logs
  referenceId: PLACEHOLDER
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          sonarProjectName: cli-plugin-logs
          nodeVersion: 20-bookworm
          nodeCommands:
            - test -- --passWithNoTests --coverage
        runtime:
          architecture: amd64
        when:
          - event: pull_request
            source: branch
          - event: push
            source: branch
            regex: master
      - name: techdocs-v1
        parameters:
          entityReference: default/component/cli-plugin-logs
          sourceDir: ./
        when:
          - event: push
            source: branch
            regex: master
            path:
              - "docs/**"
              - README.md
              - .vtex/deployment.yaml